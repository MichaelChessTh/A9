name: Build Android APK

on:
  push:
    branches: [ main, master ]
    paths-ignore:
      - '**.md'
      - 'ios/**'
      - 'macos/**'
      - 'windows/**'
      - 'linux/**'
      - 'web/**'
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version name (e.g. 1.1.4)'
        required: false
        default: ''

jobs:
  build-android:
    name: Build & Release Android APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Java 17 ──────────────────────────────────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ── 3. Flutter ──────────────────────────────────────────────────────────
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          channel: 'stable'
          cache: true

      # ── 6. Get dependencies ─────────────────────────────────────────────────
      - name: Flutter pub get
        run: flutter pub get

      # ── 7. Analyze (warn only, don't fail build) ─────────────────────────────
      - name: Analyze
        run: flutter analyze --no-fatal-infos || true

      # ── 8. Build release APK ─────────────────────────────────────────────────
      - name: Build release APK
        run: |
          VERSION_NAME="${{ github.event.inputs.version_name }}"
          if [ -z "$VERSION_NAME" ]; then
            VERSION_NAME=$(grep '^version:' pubspec.yaml | sed 's/version: //' | cut -d'+' -f1)
          fi
          flutter build apk --release \
            --build-name="$VERSION_NAME" \
            --build-number=${{ github.run_number }}

      # ── 9. Rename APK ────────────────────────────────────────────────────────
      - name: Rename APK
        run: |
          VERSION_NAME="${{ github.event.inputs.version_name }}"
          if [ -z "$VERSION_NAME" ]; then
            VERSION_NAME=$(grep '^version:' pubspec.yaml | sed 's/version: //' | cut -d'+' -f1)
          fi
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk "dist/A9_v${VERSION_NAME}_b${{ github.run_number }}.apk"

      # ── 10. Upload APK as artifact ───────────────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: A9-android-apk
          path: dist/*.apk
          retention-days: 30

      # ── 11. Create GitHub Release ────────────────────────────────────────────
      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: Android Build #${{ github.run_number }}
          body: |
            Automated build from commit ${{ github.sha }}
            Branch: ${{ github.ref_name }}
          files: dist/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
